version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: orchestrate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  faiss_db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestrate_faiss
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  redis_data:
